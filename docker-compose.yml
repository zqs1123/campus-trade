services:
  # ========== 中间件 ==========
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - campus-cloud-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - campus-cloud-network

  nacos:
    image: nacos/nacos-server:v2.1.0
    container_name: nacos
    restart: always
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - campus-cloud-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - campus-cloud-network

  # ========== 微服务 ==========
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "9000:9000"
    depends_on:
      - nacos
      - user-service
      - product-service
      - order-service
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
    networks:
      - campus-cloud-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "9001:9001"
    depends_on:
      - mysql
      - redis
      - nacos
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/campus_trade?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
    networks:
      - campus-cloud-network

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "9002:9002"
    depends_on:
      - mysql
      - redis
      - nacos
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/campus_trade?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
    networks:
      - campus-cloud-network

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "9003:9003"
    depends_on:
      - mysql
      - redis
      - nacos
      - rabbitmq
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/campus_trade?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    networks:
      - campus-cloud-network

volumes:
  mysql_data:

networks:
  campus-cloud-network:
    driver: bridge